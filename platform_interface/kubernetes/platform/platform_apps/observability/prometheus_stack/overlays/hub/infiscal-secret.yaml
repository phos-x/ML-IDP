# 1. Grafana Admin Credentials
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: grafana-infisical-sync
  namespace: observability
spec:
  # The Infisical Project ID and Environment (e.g., prod)
  hostAPI: "https://infisical.platform.myorg.com/api"
  projectWorkspaceId: "YOUR_INFISICAL_PROJECT_ID"
  environmentSlug: "prod"
  secretPath: "/grafana" # The folder in Infisical where you keep these keys
  
  authentication:
    universalAuth:
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: infisical-system

  # This creates the target K8s secret that the Helm chart looks for
  managedSecretReference:
    secretName: grafana-admin-credentials 
    secretNamespace: observability

---
# 2. Thanos S3 Credentials (objstore.yml)
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: thanos-infisical-sync
  namespace: observability
spec:
  hostAPI: "https://infisical.platform.myorg.com/api"
  projectWorkspaceId: "YOUR_INFISICAL_PROJECT_ID"
  environmentSlug: "prod"
  secretPath: "/thanos" 
  
  authentication:
    universalAuth:
      credentialsRef:
        secretName: universal-auth-credentials
        secretNamespace: infisical-system

  managedSecretReference:
    secretName: thanos-s3-credentials
    secretNamespace: observability