apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tenant-owner
  namespace: host-${{ values.teamName }}
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"] 
  - apiGroups: ["platform.myorg.io"]
    resources: ["mlworkspaces"]
    verbs: ["get", "list", "watch"] 
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-owner-binding
  namespace: host-${{ values.teamName }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tenant-owner
subjects:
  - kind: Group
    name: "oidc-group:${{ values.teamName }}"
    apiGroup: rbac.authorization.k8s.io