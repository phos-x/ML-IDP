apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ml-workspace-template
  title: Provision ML Data Science Workspace
  description: Automatically spins up an isolated Kubernetes vcluster, an AWS RDS instance, and an S3 bucket for ML workloads.
  tags:
    - machine-learning
    - vcluster
    - aws
spec:
  owner: platform-engineering
  type: environment


  parameters:
    - title: Project Details
      required:
        - teamName
        - projectName
        - costCenter
      properties:
        teamName:
          title: Team Name
          type: string
          description: "Used for namespace isolation (e.g., fraud-team)"
          pattern: '^[a-z0-9-]+$'
        projectName:
          title: Project Name
          type: string
          description: "Name of the ML model being built"
        costCenter:
          title: FinOps Cost Center
          type: string
          description: "Your department's billing code"
          enum:
            - AI-RND-100
            - DATA-OPS-200
            - RISK-MGMT-300

  steps:
    - id: fetch-base
      name: Rendering Infrastructure Manifests
      action: fetch:template
      input:
        url: ./skeleton 
        values:
          teamName: ${{ parameters.teamName }}
          projectName: ${{ parameters.projectName }}
          costCenter: ${{ parameters.costCenter }}

    - id: publish-gitops
      name: Committing to GitOps Repository
      action: publish:github:pull-request
      input:
        allowedHosts: ['github.com']
        title: "Platform Request: ML Workspace for ${{ parameters.teamName }}"
        description: "Automated provisioning PR generated by Backstage."
        repoUrl: "github.com?owner=YOUR_ORG&repo=platform-gitops"
        branchName: "tenant-${{ parameters.teamName }}-${{ parameters.projectName }}"
        targetPath: kubernetes/tenants/${{ parameters.teamName }}/

  output:
    links:
      - title: View ArgoCD Deployment Status
        url: https://argocd.myorg.com/applications/${{ parameters.teamName }}-workspace
      - title: View OpenCost FinOps Dashboard
        url: https://finops.myorg.com/